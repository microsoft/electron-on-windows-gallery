<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electron on Windows Gallery</title>
    <script type="module" src="https://unpkg.com/@fluentui/web-components"></script>
    <link rel="stylesheet" href="styles/fluent-tokens.css" />
    <link rel="stylesheet" href="styles/fluent-components.css" />
    <style>
      body {
        margin: 0;
        padding-top: var(--titlebar-height); /* Add padding to account for fixed titlebar */
        padding-left: var(--sidebar-width); /* Add padding to account for fixed side panel */
        background-color: transparent;
      }

      #content-area {
        width: calc(100vw - var(--sidebar-width)); /* Full viewport width minus side panel */
        height: calc(100vh - var(--titlebar-height)); /* Full viewport height minus titlebar */
        overflow: hidden;
        border-top-left-radius: var(--border-radius-large);
        border: 1px solid var(--color-neutral-stroke-1);
        background-color: var(--color-neutral-background-2);
      }

      #content-area iframe {
        opacity: 0;
        transform: translateY(10%);
        transition: opacity 0.2s ease-out, transform 0.2s ease-out;
        border-top-left-radius: var(--border-radius-large);
      }

      #content-area iframe.loaded {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <custom-titlebar></custom-titlebar>
    <custom-sidepanel></custom-sidepanel>
    <div id="content-area">
      <!-- Dynamic content loads here -->
    </div>
    
    <script type="module">
      import { openSample, showHome, goBack, restorePageOrShowHome } from './scripts/appNavigation.js';
      window.openSample = openSample;
      window.showHome = showHome;
      window.goBack = goBack;
      import './scripts/fluent-controls.js';
      import './scripts/titlebar.js';
      import './scripts/sidepanel.js';
      
      // Load home content on initial page load, or restore previous page after hot reload
      document.addEventListener('DOMContentLoaded', () => {
        restorePageOrShowHome();
      });
    </script>
  </body>
</html>
