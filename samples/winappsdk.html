<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinAppSDK - Electron Gallery</title>
    <link rel="stylesheet" href="../styles/fluent-tokens.css">
    <link rel="stylesheet" href="../styles/fluent-components.css">
    <style>
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--spacing-vertical-l);
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: var(--spacing-horizontal-s);
      }
      .page-icon {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .secondary-page-title {
        font-size: 20px;
        display: flex;
        margin: 0;
      }
      .sidebar {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-vertical-l);
      }
      .sidebar-section {
        background: var(--color-neutral-background-1);
        border: 1px solid var(--color-neutral-stroke-1);
        border-radius: var(--border-radius-large);
        overflow: hidden;
        box-shadow: var(--shadow-2);
        height: 100%;
        margin: var(--spacing-vertical-s);
      }
      .sidebar-title {
        font-weight: var(--font-weight-semibold);
        color: var(--color-neutral-foreground-1);
        font-size: var(--font-size-base-300);
        display: flex;
        align-items: flex-start;
        gap: var(--spacing-horizontal-s);
        padding-bottom: var(--spacing-vertical-s);
      }
      .sidebar-header {
        padding: var(--spacing-vertical-m) var(--spacing-horizontal-m);
        background: var(--color-neutral-background-1);
        border-bottom: 1px solid var(--color-neutral-stroke-1);
        display: flex;
        flex-direction: column;
      }
      .notification-btn {
        width: auto;
        min-width: 200px;
        max-width: 100%;
        padding: 8px 18px;
        margin: 16px 16px;
        display: block;
        background: var(--color-brand-background-1, #0078d4);
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-family: 'Segoe UI', 'Segoe UI Web', Arial, sans-serif;
        font-weight: 500;
        box-shadow: 0 1px 4px 0 rgba(0,0,0,0.08);
        cursor: pointer;
        transition: background 0.15s, box-shadow 0.15s;
      }
      .notification-btn:hover {
        background: var(--color-brand-background-2, #106ebe);
        box-shadow: 0 2px 8px 0 rgba(0,0,0,0.10);
      }
      .notification-btn:active {
  background: var(--color-brand-background-3, #005a9e);
  box-shadow: 0 1px 4px 0 rgba(0,0,0,0.14);
  /* Remove any shrinking effect */
  transform: none;
      }
      @media (max-width: 1000px) {
        .top-section {
          grid-template-columns: 1fr;
          gap: var(--spacing-vertical-xl);
        }
      }
  /* Only styles actually used by the current HTML structure are retained */
    </style>
  </head>
  <body>
    <div class="secondary-container">
      <button class="fluent-button back-button" onclick="window.history.back()">
        <span class="icon">&#xE72B;</span>
      </button>
      <div class="page-header">
        <div class="header-left">
          <div class="page-icon">
            <img src="../assets/WindowsAppSDK-logo.svg" alt="WinAppSDK" style="width: 25px; height: 25px; object-fit: contain;" />
          </div>
          <h1 class="secondary-page-title">WinAppSDK</h1>
        </div>
      </div>
      <div class="page-layout">
        <div class="sidebar">
          <div class="sidebar-section">
            <div class="sidebar-header">
              <div class="sidebar-title">
                <span class="icon" style="font-family: 'Segoe Fluent Icons', sans-serif; font-size: 16px; color: var(--color-communication-foreground, #0078d4);">&#xea8f;</span>
                App Notifications
              </div>
              <div style="color: var(--color-neutral-foreground-2); font-size: 12px; line-height: normal;">
                  Send rich interactive notifications from your app. Notifications can include text, images, and actions.
              </div>
            </div>
            <div class="sample-list">
              <button class="fluent-button notification-btn" id="fire-notification-btn">
                Fire App Notification
              </button>
            </div>
          </div>
        </div>
        <div class="sidebar">
          <div class="sidebar-section">
            <div class="sidebar-header">
              <div class="sidebar-title">
                <span class="icon" style="font-family: 'Segoe Fluent Icons', sans-serif; font-size: 16px; color: var(--color-communication-foreground, #0078d4);">&#xea8f;</span>
                Badge Notifications
              </div>
              <div style="color: var(--color-neutral-foreground-2); font-size: 12px; line-height: normal;">
                  Badge notifications provide a lightweight way to convey status or alerts through small overlays on your app's icon. 
              </div>
            </div>
            <div class="sample-list">
              <button class="fluent-button notification-btn" id="show-badge-btn">
                Show Badge Notification
              </button>
              <button class="fluent-button notification-btn" id="hide-badge-btn">
                Hide Badge Notification
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="../scripts/fluent-common.js"></script>
    <script>
    document.getElementById('fire-notification-btn').addEventListener('click', function() {
      if (window.winAppSdk && window.winAppSdk.showNotification) {
        window.winAppSdk.showNotification("Test Notification", "This is a test notification");
      }
    });
    </script>
    <script>
    document.getElementById('show-badge-btn').addEventListener('click', function() {
      if (window.winAppSdk && window.winAppSdk.showBadgeNotification) {
        window.winAppSdk.showBadgeNotification(true);
      }
    });
    </script>
    <script>
    document.getElementById('hide-badge-btn').addEventListener('click', function() {
      if (window.winAppSdk && window.winAppSdk.showBadgeNotification) {
        window.winAppSdk.showBadgeNotification(false);
      }
    });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </body>
</html>
