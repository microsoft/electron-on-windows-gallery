    <script src="../scripts/fluent-common.js"></script>
    <script>
      (function initGalleryScroll() {
        const scrollRightBtn = document.querySelector('.gallery-scroll-rt-btn');
        const scrollLeftBtn = document.querySelector('.gallery-scroll-lt-btn');
        const galleryContainer = document.querySelector('.tile-gallery-container');
        function updateLeftBtnVisibility(visible) {
          if (!scrollLeftBtn || !galleryContainer) return;
          scrollLeftBtn.style.display = visible ? 'flex' : 'none';
        }
        function updateRightBtnVisibility(visible) {
          if (!scrollRightBtn || !galleryContainer) return;
          scrollRightBtn.style.display = visible ? 'flex' : 'none';
        }
        if (scrollRightBtn && galleryContainer) {
          scrollRightBtn.addEventListener('click', function () {
            galleryContainer.scrollTo({ left: galleryContainer.scrollWidth, behavior: 'smooth' });
            updateRightBtnVisibility(false);
            updateLeftBtnVisibility(true);
          });
        }
        if (scrollLeftBtn && galleryContainer) {
          scrollLeftBtn.addEventListener('click', function () {
            galleryContainer.scrollTo({ left: 0, behavior: 'smooth' });
            updateLeftBtnVisibility(false);
            updateRightBtnVisibility(true);
          });
        }
        if (galleryContainer) {
          function checkOverflow() {
            const hasOverflow = galleryContainer.scrollWidth > galleryContainer.offsetWidth;
            updateLeftBtnVisibility(galleryContainer.scrollLeft > 0 && hasOverflow);
            updateRightBtnVisibility(
              hasOverflow && galleryContainer.scrollLeft + galleryContainer.offsetWidth <
                galleryContainer.scrollWidth - 10
            );
          }
          galleryContainer.addEventListener('scroll', function () {
            updateLeftBtnVisibility(galleryContainer.scrollLeft > 0);
            updateRightBtnVisibility(
              galleryContainer.scrollLeft + galleryContainer.offsetWidth <
                galleryContainer.scrollWidth - 10
            ); // Workaround
          });
          window.addEventListener('resize', function () {
            updateLeftBtnVisibility(galleryContainer.scrollLeft > 0);
            updateRightBtnVisibility(
              galleryContainer.scrollLeft + galleryContainer.offsetWidth <
                galleryContainer.scrollWidth
            );
          });
          // Check overflow when page becomes visible (e.g., navigating back)
          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible') {
              setTimeout(checkOverflow, 50);
            }
          });
          // Check overflow on initial load and after a delay for layout to settle
          checkOverflow();
        }
      })();

      (function initSectionScrolls() {
        const sections = document.querySelectorAll('.section-scroll-container');
        
        sections.forEach(scrollContainer => {
          const scrollRightBtn = scrollContainer.querySelector('.section-scroll-rt-btn');
          const scrollLeftBtn = scrollContainer.querySelector('.section-scroll-lt-btn');
          const listContainer = scrollContainer.querySelector('.component-list-container');
          
          function updateLeftBtnVisibility(visible) {
            if (!scrollLeftBtn) return;
            scrollLeftBtn.style.display = visible ? 'flex' : 'none';
          }
          
          function updateRightBtnVisibility(visible) {
            if (!scrollRightBtn) return;
            scrollRightBtn.style.display = visible ? 'flex' : 'none';
          }
          
          function checkOverflow() {
            if (!listContainer) return;
            const hasOverflow = listContainer.scrollWidth > listContainer.offsetWidth;
            updateLeftBtnVisibility(listContainer.scrollLeft > 0 && hasOverflow);
            updateRightBtnVisibility(
              hasOverflow && listContainer.scrollLeft + listContainer.offsetWidth <
                listContainer.scrollWidth - 10
            );
          }
          
          if (scrollRightBtn && listContainer) {
            scrollRightBtn.addEventListener('click', function () {
              listContainer.scrollTo({ left: listContainer.scrollWidth, behavior: 'smooth' });
            });
          }
          
          if (scrollLeftBtn && listContainer) {
            scrollLeftBtn.addEventListener('click', function () {
              listContainer.scrollTo({ left: 0, behavior: 'smooth' });
            });
          }
          
          if (listContainer) {
            listContainer.addEventListener('scroll', function () {
              checkOverflow();
            });
            
            window.addEventListener('resize', function () {
              checkOverflow();
            });
            
            // Check overflow when page becomes visible (e.g., navigating back)
            document.addEventListener('visibilitychange', function () {
              if (document.visibilityState === 'visible') {
                setTimeout(checkOverflow, 50);
              }
            });
            
            // Check overflow after delays to allow custom elements to render
            setTimeout(checkOverflow, 100);
            setTimeout(checkOverflow, 300);
          }
        });
      })();
    </script>
    <script>
      function openExternalLink(url) {
        console.log(`Opening external link: ${url}`);
        window.open(url, '_blank');
      }
    </script>
