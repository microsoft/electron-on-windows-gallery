<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electron on Windows Gallery - Home</title>
    <script type="module" src="https://unpkg.com/@fluentui/web-components"></script>
    <link rel="stylesheet" href="../styles/fluent-tokens.css" />
    <link rel="stylesheet" href="../styles/fluent-components.css" />
    <link rel="stylesheet" href="../styles/home-page.css" />
    <script type="module" src="../scripts/fluent-controls.js"></script>
  </head>
  <body>
    <div class="container">
      <!-- Hero Section -->
      <div class="hero-section">
        <div class="hero-image-overlay"></div>
        <div class="hero-overlay"></div>
        <div class="page-title-container">
          <div class="electron-version">Electron v37.2.5</div>
          <h1 class="page-title">Electron on Windows Gallery</h1>
        </div>

        <!-- Tile Gallery -->
        <button class="gallery-scroll-rt-btn" aria-label="Scroll gallery">
          <span class="arrow">&#xF08F;</span>
        </button>
        <button class="gallery-scroll-lt-btn" aria-label="Scroll gallery">
          <span class="arrow">&#xF08D;</span>
        </button>
        <div class="tile-gallery-container">
          <div class="tile-gallery-scroll">
            <home-page-tile
              icon="../assets/Header-WindowsDesign.png"
              title="Windows App Development CLI"
              description="Command-line tool for building and packaging Windows apps."
              link="https://github.com/microsoft/WinAppCli"
              aria-label="Windows App Development CLI"
            >
            </home-page-tile>
            <home-page-tile
              icon="../assets/Header-WindowsDesign.png"
              title="Windows AI Addon"
              description="NodeJS addon for integrating Windows AI capabilities into Electron apps."
              link="https://github.com/microsoft/winapp-windows-ai"
              aria-label="Windows AI Addon"
            >
            </home-page-tile>
            <home-page-tile
              icon="../assets/electron logo.svg"
              title="Getting started"
              description="An overview of app development options, tools, and samples."
              link="https://www.electronjs.org/docs/latest/tutorial/tutorial-first-app"
              aria-label="Getting started"
            >
            </home-page-tile>
            <home-page-tile
              icon="../assets/electron logo.svg"
              title="Documentation"
              description="Complete guides and API references for Electron development"
              link="https://www.electronjs.org/"
              aria-label="Electron"
            >
            </home-page-tile>
            <home-page-tile
              icon="../assets/Header-WindowsDesign.png"
              title="Windows design"
              description="Design guidelines and toolkits for creating native app experiences."
              link="https://learn.microsoft.com/en-us/windows/apps/design/"
              aria-label="Windows design"
            >
            </home-page-tile>
            <home-page-tile
              icon="../assets/Header-Github.light.png"
              title="GitHub"
              description="Repository for Electron framework and community contributions."
              link="https://github.com/electron/electron"
              aria-label="GitHub"
            >
            </home-page-tile>
            <home-page-tile
              icon="&#xE943;"
              title="Code samples"
              description="Find samples that demonstrate specific tasks, features, and APIs."
              link="https://www.electronjs.org/docs/latest/tutorial/examples"
              aria-label="Code samples"
            >
            </home-page-tile>
            <home-page-tile
              icon="../assets/Header-Store.light.png"
              title="Partner Center"
              description="Discover apps built with Electron by companies and developers."
              link="https://developer.microsoft.com/en-us/windows/"
              aria-label="Partner Center"
            >
            </home-page-tile>
          </div>
        </div>
      </div>

      <!-- Content Section -->
      <div class="content-section">
        <!-- Recently Added Samples -->
        <div class="section">
          <h2 class="section-heading">Recently added samples</h2>
          <div class="component-list">
            <home-page-sample-button
              title="Model Context Protocol"
              description="Integrate with MCP servers and call tools using the Model Context Protocol."
              sample="Model Context Protocol"
            >
            </home-page-sample-button>
            <home-page-sample-button
              title="Windows SDK"
              description="Integrate Windows SDK features like Scene Graph and native Windows APIs into your Electron apps."
              sample="Windows SDK"
            >
            </home-page-sample-button>
          </div>
        </div>

        <!-- Recently Updated Samples -->
        <div class="section">
          <h2 class="section-heading">Recently updated samples</h2>
          <div class="component-list">
            <home-page-sample-button
              title="Phi Silica Text Generation"
              description="Integrate advanced text generation capabilities using Phi Silica models."
              sample="Phi Silica Text Generation"
            >
            </home-page-sample-button>
            <home-page-sample-button
              title="Phi Silica Text Summarization"
              description="Summarize text and conversations using advanced models from Phi Silica."
              sample="Phi Silica Text Summarization"
            >
            </home-page-sample-button>
            <home-page-sample-button
              title="Phi Silica Rewrite Text"
              description="Rewrite text into alternate tones using advanced models from Phi Silica."
              sample="Phi Silica Rewrite Text"
            >
            </home-page-sample-button>
            <home-page-sample-button
              title="Phi Silica Convert Text to Table"
              description="Convert text into structured table format using advanced models from Phi Silica."
              sample="Phi Silica Convert Text to Table"
            >
            </home-page-sample-button>
            <home-page-sample-button
              title="Optical Character Recognition (OCR)"
              description="Detect and extract text within images and convert it into machine readable character streams."
              sample="Optical Character Recognition (OCR)"
            >
            </home-page-sample-button>
            <home-page-sample-button
              title="Image Description"
              description="Generate text captions for images using Windows AI Foundry Imaging API's."
              sample="Image Description"
            >
            </home-page-sample-button>
          </div>
        </div>
      </div>
    </div>
    <script src="../scripts/fluent-common.js"></script>
    <script>
      (function initGalleryScroll() {
        const scrollRightBtn = document.querySelector('.gallery-scroll-rt-btn');
        const scrollLeftBtn = document.querySelector('.gallery-scroll-lt-btn');
        const galleryContainer = document.querySelector('.tile-gallery-container');
        function updateLeftBtnVisibility(visible) {
          if (!scrollLeftBtn || !galleryContainer) return;
          scrollLeftBtn.style.display = visible ? 'flex' : 'none';
        }
        function updateRightBtnVisibility(visible) {
          if (!scrollRightBtn || !galleryContainer) return;
          scrollRightBtn.style.display = visible ? 'flex' : 'none';
        }
        if (scrollRightBtn && galleryContainer) {
          scrollRightBtn.addEventListener('click', function () {
            galleryContainer.scrollTo({ left: galleryContainer.scrollWidth, behavior: 'smooth' });
            updateRightBtnVisibility(false);
            updateLeftBtnVisibility(true);
          });
        }
        if (scrollLeftBtn && galleryContainer) {
          scrollLeftBtn.addEventListener('click', function () {
            galleryContainer.scrollTo({ left: 0, behavior: 'smooth' });
            updateLeftBtnVisibility(false);
            updateRightBtnVisibility(true);
          });
        }
        if (galleryContainer) {
          galleryContainer.addEventListener('scroll', function () {
            updateLeftBtnVisibility(galleryContainer.scrollLeft > 0);
            updateRightBtnVisibility(
              galleryContainer.scrollLeft + galleryContainer.offsetWidth <
                galleryContainer.scrollWidth - 10
            ); // Workaround
          });
          window.addEventListener('resize', function () {
            updateLeftBtnVisibility(galleryContainer.scrollLeft > 0);
            updateRightBtnVisibility(
              galleryContainer.scrollLeft + galleryContainer.offsetWidth <
                galleryContainer.scrollWidth
            );
          });
        }
      })();
    </script>
    <script>
      function openExternalLink(url) {
        console.log(`Opening external link: ${url}`);
        window.open(url, '_blank');
      }
    </script>
  </body>
</html>
