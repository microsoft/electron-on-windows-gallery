<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Super Resolution - Electron on Windows Gallery</title>
    <script type="module" src="https://unpkg.com/@fluentui/web-components"></script>
    <link rel="stylesheet" href="../styles/fluent-tokens.css" />
    <link rel="stylesheet" href="../styles/fluent-components.css" />
    <link rel="stylesheet" href="../styles/samples.css" />
    <link rel="stylesheet" href="../styles/img-description.css" />
    <script type="module" src="../scripts/fluent-controls.js"></script>
  </head>
  <body>
    <div class="secondary-container">
      <div class="page-header">
        <div class="header-left">
          <div class="page-icon"><img src="../assets/WCRAPI.svg" alt="Video Super Resolution" style="width: 24px; height: 24px; object-fit: contain" /></div>
          <h1 class="secondary-page-title">Video Super Resolution</h1>
        </div>
        <export-sample-button href="https://github.com/microsoft/electron-on-windows-gallery/blob/main/samples/video-scaler.html"></export-sample-button>
      </div>
      <div class="page-layout">
        <div id="copilot-section"></div>
        <div class="sidebar">
            <div class="sidebar-section">
              <div class="sidebar-header"><span class="icon" style="font-family: 'Segoe Fluent Icons', sans-serif; font-size: 16px; color: var(--color-communication-foreground);">&#xe754;</span> Other samples</div>
              <div class="sample-list">
                <other-samples-button icon="&#xE8B9;" label="Image Super Resolution"></other-samples-button>
                <other-samples-button icon="&#xE8B9;" label="Image Generator"></other-samples-button>
                <other-samples-button icon="&#xE8B9;" label="Image Description"></other-samples-button>
              </div>
            </div>
          </div>
        <div class="bottom-section">
          <div class="section-card">
            <div class="section-header">
              <div class="section-title"><span class="icon" style="font-family: 'Segoe Fluent Icons', sans-serif; font-size: 16px; color: var(--color-communication-foreground);">&#xe943;</span> API</div>
              <copy-button id="api-copy-btn"></copy-button>
            </div>
            <div class="code-content collapsed" id="api-code-content">
              <div class="code-line"><span class="keyword">const</span> <span class="variable">scaler</span> = <span class="keyword">await</span> <span class="type">VideoScaler</span>.<span class="variable">CreateAsync</span>();</div>
              <div class="code-line"><span class="keyword">const</span> <span class="variable">options</span> = <span class="keyword">new</span> <span class="type">VideoScalerOptions</span>();</div>
              <div class="code-line"><span class="keyword">const</span> <span class="variable">result</span> = <span class="variable">scaler</span>.<span class="variable">ScaleFrame</span>(<span class="variable">inputBuffer</span>, <span class="variable">outputBuffer</span>, <span class="variable">options</span>);</div>
            </div>
            <div class="view-code-link"><a href="#" id="view-code-btn">View code</a></div>
          </div>
          <div class="section-card">
            <div class="section-header">
              <div class="section-title"><span class="icon" style="font-family: 'Segoe Fluent Icons', sans-serif; font-size: 16px; color: var(--color-communication-foreground);">&#xe7c3;</span> Documentation</div>
              <view-documentation-button href="https://learn.microsoft.com/windows/ai/apis/video-super-resolution" label="View documentation →"></view-documentation-button>
            </div>
            <div class="documentation-content"><div id="ai-doc-markdown" class="markdown-doc">Loading documentation...</div></div>
          </div>
        </div>
      </div>
    </div>
    <script src="../scripts/fluent-common.js"></script>
    <script type="module" src="../scripts/fluent-controls.js"></script>
    <script>
      function renderCopilotSection() {
        const container = document.getElementById('copilot-section');
        let isReady = false;
        try { isReady = window.parent.externalWindowsAI.isVideoScalerReady(); } catch (e) {}

        if (isReady) {
          container.innerHTML = `
            <div style="display:flex; flex-direction:column; height:100%;">
              <div style="flex:1 1 auto; display:flex; gap:12px; align-items:center; justify-content:center; padding:12px;">
                <div style="flex:1; text-align:center;">
                  <div style="font-size:12px; margin-bottom:4px; color:var(--color-neutral-foreground-2);">Input Frame</div>
                  <img id="ai-original-image" src="../assets/ImgDescription-DefaultImg.png" alt="Input" style="max-width:100%; max-height:300px; object-fit:contain; border-radius:var(--border-radius-large);" />
                </div>
                <div style="flex:1; text-align:center;">
                  <div style="font-size:12px; margin-bottom:4px; color:var(--color-neutral-foreground-2);">Upscaled Frame</div>
                  <div id="ai-result-container" style="min-height:100px; display:flex; align-items:center; justify-content:center;">
                    <span style="color:var(--color-neutral-foreground-3);">Select an image and click scale</span>
                  </div>
                </div>
              </div>
              <div class="ocr-controls">
                <div class="ocr-control-panel">
                  <label style="font-size:13px;">Output size:</label>
                  <fluent-combobox id="output-size-select" placeholder="1920x1080" style="min-width:130px;">
                    <fluent-option value="1280x720" style="padding: 7px 5px;">720p</fluent-option>
                    <fluent-option value="1920x1080" style="padding: 7px 5px;">1080p</fluent-option>
                    <fluent-option value="3840x2160" style="padding: 7px 5px;">4K</fluent-option>
                  </fluent-combobox>
                  <button class="ocr-icon-btn" id="ai-select-btn" title="Select file"><span style="font-family: 'Segoe Fluent Icons', sans-serif; font-size:18px;">&#xEE71;</span></button>
                  <button class="ocr-icon-btn" id="ai-run-btn" title="Scale frame"><span style="font-family: 'Segoe Fluent Icons', sans-serif; font-size:18px;">&#xE794;</span></button>
                </div>
              </div>
              <input type="file" id="ai-file-input" accept="image/*" style="display:none;" />
              <div class="fact-disclaimer"><span style="font-family: 'Segoe Fluent Icons', sans-serif; font-size: 16px;">&#xE946;</span> AI-generated content might be incorrect, offensive, or biased.</div>
            </div>`;

          let currentFilePath = null;
          let isPageActive = true;
          window.addEventListener('pagehide', () => { isPageActive = false; });
          window.parent.electronUtils.getImgDescriptionImagePath().then(p => { currentFilePath = p; });

          setTimeout(() => {
            const runBtn = document.getElementById('ai-run-btn');
            const selectBtn = document.getElementById('ai-select-btn');
            const fileInputEl = document.getElementById('ai-file-input');

            if (runBtn) runBtn.addEventListener('click', async () => {
              runBtn.disabled = true;
              const resultContainer = document.getElementById('ai-result-container');
              resultContainer.innerHTML = '<span style="color:var(--color-neutral-foreground-3);">Scaling frame...</span>';
              try {
                const sizeStr = document.getElementById('output-size-select')?.value || '1920x1080';
                const [w, h] = sizeStr.split('x').map(Number);
                const result = await window.parent.externalWindowsAI.scaleVideoFrame(currentFilePath, w, h);
                if (result && !result.error && isPageActive) {
                  resultContainer.innerHTML = '<span style="color:var(--color-neutral-foreground-2);">Scale complete (' + result.width + 'x' + result.height + ', status: ' + result.status + ')</span>';
                } else if (result?.error && isPageActive) {
                  resultContainer.innerHTML = '<span style="color:red;">' + result.error + '</span>';
                }
              } catch (e) {
                if (isPageActive) resultContainer.innerHTML = '<span style="color:red;">Error scaling frame</span>';
              } finally {
                if (isPageActive) runBtn.disabled = false;
              }
            });

            if (selectBtn && fileInputEl) {
              selectBtn.addEventListener('click', () => fileInputEl.click());
              fileInputEl.addEventListener('change', async (e) => {
                const f = e.target.files && e.target.files[0];
                if (!f) return;
                currentFilePath = await window.parent.electronUtils.getPathForFile(f);
                document.getElementById('ai-original-image').src = URL.createObjectURL(f);
              });
            }
          }, 50);
        } else {
          container.innerHTML = `<div class="requirement-card"><div class="requirement-icon"><img src="../assets/WCRAPI.svg" alt="Copilot+ PC" style="width:40px;height:40px;object-fit:contain;" /></div><div class="requirement-title">Copilot+ PC required</div><div class="requirement-subtitle">This Windows AI API requires a Copilot+ PC with Windows App SDK 2.0 experimental.</div><div class="requirement-description"><a href="https://learn.microsoft.com/windows/ai/apis/video-super-resolution" class="learn-more-link" target="_blank">Learn more</a></div><p class="requirement-description">You can still view the code for the sample.</p></div>`;
        }
      }
      document.addEventListener('DOMContentLoaded', renderCopilotSection);
      document.addEventListener('DOMContentLoaded', function () {
        const apiCopyBtn = document.getElementById('api-copy-btn');
        if (apiCopyBtn) apiCopyBtn.setAttribute('copy-text', `const scaler = await VideoScaler.CreateAsync();\nconst options = new VideoScalerOptions();\nconst result = scaler.ScaleFrame(inputBuffer, outputBuffer, options);`);
        var viewCodeBtn = document.getElementById('view-code-btn');
        if (viewCodeBtn) viewCodeBtn.addEventListener('click', function (e) { e.preventDefault(); document.getElementById('api-code-content').classList.remove('collapsed'); viewCodeBtn.parentElement.style.display = 'none'; });
      });
    </script>
    <script type="module">import { injectGithubMarkdownStyles } from '../styles/github-markdown.js'; injectGithubMarkdownStyles();</script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module">import { renderGithubMarkdownDoc } from '../scripts/github-markdown-render.js'; renderGithubMarkdownDoc('ai-doc-markdown','https://raw.githubusercontent.com/MicrosoftDocs/windows-ai-docs/docs/docs/apis/video-super-resolution.md',/^(#+\s*Get\s+started.*)$/im,'https://learn.microsoft.com/windows/ai/apis',true);</script>
  </body>
</html>
