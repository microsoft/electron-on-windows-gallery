<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Super Resolution - Electron on Windows Gallery</title>
    <script type="module" src="https://unpkg.com/@fluentui/web-components"></script>
    <link rel="stylesheet" href="../styles/fluent-tokens.css" />
    <link rel="stylesheet" href="../styles/fluent-components.css" />
    <link rel="stylesheet" href="../styles/samples.css" />
    <link rel="stylesheet" href="../styles/img-description.css" />
    <script type="module" src="../scripts/fluent-controls.js"></script>
  </head>
  <body>
    <div class="secondary-container">
      <div class="page-header">
        <div class="header-left">
          <div class="page-icon">
            <img
              src="../assets/WCRAPI.svg"
              alt="Image Super Resolution"
              style="width: 24px; height: 24px; object-fit: contain"
            />
          </div>
          <h1 class="secondary-page-title">Image Super Resolution</h1>
        </div>
        <export-sample-button
          href="https://github.com/microsoft/electron-on-windows-gallery/blob/main/samples/image-scaler.html"
        ></export-sample-button>
      </div>

      <div class="page-layout">
        <div id="copilot-section"></div>
        <div class="sidebar">
            <div class="sidebar-section">
              <div class="sidebar-header">
                <span class="icon" style="font-family: 'Segoe Fluent Icons', sans-serif; font-size: 16px; color: var(--color-communication-foreground);">&#xe754;</span>
                Other samples
              </div>
              <div class="sample-list">
                <other-samples-button icon="&#xE8B9;" label="Image Description"></other-samples-button>
                <other-samples-button icon="&#xE8B9;" label="Image Object Extractor"></other-samples-button>
                <other-samples-button icon="&#xE8B9;" label="Image Object Remover"></other-samples-button>
                <other-samples-button icon="&#xE8B9;" label="OCR"></other-samples-button>
              </div>
            </div>
          </div>

        <div class="bottom-section">
          <div class="section-card">
            <div class="section-header">
              <div class="section-title">
                <span class="icon" style="font-family: 'Segoe Fluent Icons', sans-serif; font-size: 16px; color: var(--color-communication-foreground);">&#xe943;</span>
                API
              </div>
              <copy-button id="api-copy-btn"></copy-button>
            </div>
            <div class="code-content collapsed" id="api-code-content">
              <div class="code-line">
                <span class="keyword">const</span> <span class="variable">scaler</span> =
                <span class="keyword">await</span>
                <span class="type">ImageScaler</span>.<span class="variable">CreateAsync</span>();
              </div>
              <div class="code-line">
                <span class="keyword">const</span> <span class="variable">scaledBitmap</span> =
                <span class="variable">scaler</span>.<span class="variable">ScaleImageBuffer</span>(<span class="variable">imageBuffer</span>, <span class="variable">targetWidth</span>, <span class="variable">targetHeight</span>);
              </div>
              <div class="code-line">
                <span class="variable">scaler</span>.<span class="variable">Close</span>();
              </div>
            </div>
            <div class="view-code-link">
              <a href="#" id="view-code-btn">View code</a>
            </div>
          </div>

          <div class="section-card">
            <div class="section-header">
              <div class="section-title">
                <span class="icon" style="font-family: 'Segoe Fluent Icons', sans-serif; font-size: 16px; color: var(--color-communication-foreground);">&#xe7c3;</span>
                Documentation
              </div>
              <view-documentation-button
                href="https://learn.microsoft.com/windows/ai/apis/imaging"
                label="View documentation →"
              ></view-documentation-button>
            </div>
            <div class="documentation-content">
              <div id="ai-doc-markdown" class="markdown-doc">Loading documentation...</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../scripts/fluent-common.js"></script>
    <script type="module" src="../scripts/fluent-controls.js"></script>
    <script>
      function renderCopilotSection() {
        const container = document.getElementById('copilot-section');
        let isReady = false;
        try {
          isReady = window.parent.externalWindowsAI.isImageScalerReady();
        } catch (e) {
          console.error('Error checking ImageScaler readiness:', e);
        }

        if (isReady) {
          container.innerHTML = `
            <div style="display:flex; gap:24px; align-items:flex-start;">
              <!-- Left: Image comparison area -->
              <div style="flex:1 1 0; min-width:240px; max-width:600px;">
                <div style="position:relative; background:var(--color-neutral-background-3); border:2px solid var(--color-neutral-stroke-1); border-radius:var(--border-radius-xlarge); overflow:hidden;">
                  <div id="image-compare-wrapper" style="position:relative; display:flex;">
                    <div id="compare-grid" style="display:grid; grid-template-columns:1fr 1fr; width:100%; position:relative;">
                      <canvas id="ai-original-canvas" style="display:block; width:100%; height:auto;"></canvas>
                      <canvas id="ai-scaled-canvas" style="display:none; width:100%; height:auto;"></canvas>
                    </div>
                    <div id="splitter-bar" style="display:none; position:absolute; top:0; bottom:0; width:16px; cursor:col-resize; background:var(--color-neutral-background-1); border-left:1px solid var(--color-neutral-stroke-1); border-right:1px solid var(--color-neutral-stroke-1); z-index:5; left:50%; transform:translateX(-50%);"></div>
                  </div>
                  <!-- ProgressRing overlay -->
                  <div id="loader-overlay" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.25); z-index:10; align-items:center; justify-content:center;">
                    <div style="width:48px; height:48px; border:4px solid var(--color-neutral-stroke-1); border-top-color:var(--color-brand-background-1); border-radius:50%; animation:spin 0.8s linear infinite;"></div>
                  </div>
                  <!-- Scaled dimensions label (bottom-left) -->
                  <div id="scaled-dims-panel" style="display:none; position:absolute; bottom:8px; left:8px; padding:8px; background:var(--color-neutral-background-1); border-radius:var(--border-radius-medium); opacity:0.92; z-index:3;">
                    <div style="font-size:12px; color:var(--color-neutral-foreground-2);">New</div>
                    <div id="scaled-dimensions" style="font-weight:600; font-size:13px;"></div>
                  </div>
                  <!-- Original dimensions label (bottom-right) -->
                  <div id="original-dims-panel" style="display:none; position:absolute; bottom:8px; right:8px; padding:8px; background:var(--color-neutral-background-1); border-radius:var(--border-radius-medium); opacity:0.92; text-align:right; z-index:3;">
                    <div style="font-size:12px; color:var(--color-neutral-foreground-2);">Original</div>
                    <div id="original-dimensions" style="font-weight:600; font-size:13px;"></div>
                  </div>
                  <!-- Select image dropdown (top-right) -->
                  <div style="position:absolute; top:8px; right:8px; z-index:4;">
                    <div style="position:relative; display:inline-block;">
                      <button class="ocr-icon-btn" id="ai-select-btn" title="Select image" style="background:var(--color-neutral-background-1); opacity:0.92;">
                        <span style="font-family:'Segoe Fluent Icons',sans-serif; font-size:16px;">&#xEE71;</span>
                      </button>
                      <div id="select-menu" style="display:none; position:absolute; top:100%; right:0; margin-top:4px; background:var(--color-neutral-background-1); border:1px solid var(--color-neutral-stroke-1); border-radius:var(--border-radius-medium); box-shadow:var(--shadow-8); z-index:20; min-width:140px;">
                        <button id="menu-from-file" style="display:block; width:100%; padding:8px 12px; border:none; background:none; text-align:left; cursor:pointer; color:var(--color-neutral-foreground-1); font-size:13px;">From file</button>
                        <button id="menu-from-clipboard" style="display:block; width:100%; padding:8px 12px; border:none; background:none; text-align:left; cursor:pointer; color:var(--color-neutral-foreground-1); font-size:13px;">From clipboard</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <!-- Right: Scale controls -->
              <div id="options-panel" style="min-width:160px; display:flex; flex-direction:column; gap:8px;">
                <div style="font-size:14px;">
                  <span>Scale:</span> <span id="scale-label" style="font-weight:600;">4</span><span style="font-weight:600;">x</span>
                </div>
                <input type="range" id="scale-slider" min="1" max="8" step="1" value="4"
                  style="width:100%; accent-color:var(--color-brand-background-1);" />
                <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--color-neutral-foreground-3);">
                  <span>1x</span><span>8x</span>
                </div>
                <button id="ai-run-btn" style="margin-top:8px; padding:8px 16px; background:var(--color-brand-background-1); color:var(--color-neutral-foreground-on-brand); border:none; border-radius:var(--border-radius-medium); cursor:pointer; font-size:14px; font-weight:600;">Scale</button>
              </div>
              <input type="file" id="ai-file-input" accept="image/*" style="display:none;" />
            </div>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
            <div class="fact-disclaimer">
              <span style="font-family: 'Segoe Fluent Icons', sans-serif; font-size: 16px;">&#xE946;</span>
              AI-generated content might be incorrect, offensive, or biased.
            </div>
          `;

          let currentFilePath = null;
          let originalWidth = 0, originalHeight = 0;
          let isPageActive = true;
          window.addEventListener('pagehide', () => { isPageActive = false; });

          // Bgra8 (premultiplied) -> Rgba8 canvas rendering
          function renderBgra8ToCanvas(canvas, pixels, width, height, stride) {
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            const imageData = ctx.createImageData(width, height);
            const dst = imageData.data;
            for (let y = 0; y < height; y++) {
              for (let x = 0; x < width; x++) {
                const srcIdx = y * stride + x * 4;
                const dstIdx = (y * width + x) * 4;
                const a = pixels[srcIdx + 3];
                if (a === 0) {
                  dst[dstIdx] = 0; dst[dstIdx+1] = 0; dst[dstIdx+2] = 0; dst[dstIdx+3] = 0;
                } else {
                  dst[dstIdx]     = Math.min(255, Math.round(pixels[srcIdx + 2] * 255 / a));
                  dst[dstIdx + 1] = Math.min(255, Math.round(pixels[srcIdx + 1] * 255 / a));
                  dst[dstIdx + 2] = Math.min(255, Math.round(pixels[srcIdx]     * 255 / a));
                  dst[dstIdx + 3] = a;
                }
              }
            }
            ctx.putImageData(imageData, 0, 0);
          }

          function showOriginalImage(imgEl) {
            const canvas = document.getElementById('ai-original-canvas');
            if (!canvas || !imgEl) return;
            canvas.width = imgEl.naturalWidth;
            canvas.height = imgEl.naturalHeight;
            originalWidth = imgEl.naturalWidth;
            originalHeight = imgEl.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(imgEl, 0, 0);
            document.getElementById('original-dimensions').textContent = originalWidth + ' x ' + originalHeight;
            document.getElementById('original-dims-panel').style.display = 'block';
            // Hide scaled result until scale is run
            document.getElementById('ai-scaled-canvas').style.display = 'none';
            document.getElementById('scaled-dims-panel').style.display = 'none';
            document.getElementById('splitter-bar').style.display = 'none';
            document.getElementById('compare-grid').style.gridTemplateColumns = '1fr';
          }

          async function scaleImage() {
            if (!currentFilePath) return;
            const slider = document.getElementById('scale-slider');
            const scaleFactor = parseInt(slider.value);
            const targetWidth = originalWidth * scaleFactor;
            const targetHeight = originalHeight * scaleFactor;

            // Show loader
            const loader = document.getElementById('loader-overlay');
            loader.style.display = 'flex';
            document.getElementById('scaled-dims-panel').style.display = 'none';
            document.getElementById('ai-scaled-canvas').style.display = 'none';
            document.getElementById('splitter-bar').style.display = 'none';
            document.getElementById('ai-run-btn').disabled = true;

            try {
              const result = await window.parent.externalWindowsAI.scaleImage(currentFilePath, targetWidth, targetHeight);
              if (result && result.pixels && isPageActive) {
                const scaledCanvas = document.getElementById('ai-scaled-canvas');
                renderBgra8ToCanvas(scaledCanvas, result.pixels, result.width, result.height, result.stride);
                scaledCanvas.style.display = 'block';
                document.getElementById('scaled-dimensions').textContent = result.width + ' x ' + result.height;
                document.getElementById('scaled-dims-panel').style.display = 'block';
                document.getElementById('splitter-bar').style.display = 'block';
                document.getElementById('compare-grid').style.gridTemplateColumns = '1fr 1fr';
              } else if (isPageActive) {
                console.error('No result returned from scaleImage');
              }
            } catch (e) {
              console.error('Scale error:', e);
            } finally {
              if (isPageActive) {
                loader.style.display = 'none';
                document.getElementById('ai-run-btn').disabled = false;
              }
            }
          }

          // Load default image and auto-scale
          window.parent.electronUtils.getImgDescriptionImagePath().then((path) => {
            currentFilePath = path;
            const img = new Image();
            img.onload = () => {
              showOriginalImage(img);
              scaleImage();
            };
            img.src = '../assets/ImgDescription-DefaultImg.png';
          });

          setTimeout(() => {
            // Scale slider label update
            const slider = document.getElementById('scale-slider');
            const label = document.getElementById('scale-label');
            if (slider && label) {
              slider.addEventListener('input', () => { label.textContent = slider.value; });
            }

            // Scale button
            const runBtn = document.getElementById('ai-run-btn');
            if (runBtn) runBtn.addEventListener('click', scaleImage);

            // Select menu toggle
            const selectBtn = document.getElementById('ai-select-btn');
            const selectMenu = document.getElementById('select-menu');
            if (selectBtn && selectMenu) {
              selectBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                selectMenu.style.display = selectMenu.style.display === 'none' ? 'block' : 'none';
              });
              document.addEventListener('click', () => { selectMenu.style.display = 'none'; });
            }

            // From file
            const menuFromFile = document.getElementById('menu-from-file');
            const fileInputEl = document.getElementById('ai-file-input');
            if (menuFromFile && fileInputEl) {
              menuFromFile.addEventListener('click', () => {
                selectMenu.style.display = 'none';
                fileInputEl.click();
              });
              fileInputEl.addEventListener('change', async (e) => {
                const f = e.target.files && e.target.files[0];
                if (!f) return;
                currentFilePath = await window.parent.electronUtils.getPathForFile(f);
                const url = URL.createObjectURL(f);
                const img = new Image();
                img.onload = () => {
                  showOriginalImage(img);
                  scaleImage();
                };
                img.src = url;
              });
            }

            // From clipboard
            const menuFromClipboard = document.getElementById('menu-from-clipboard');
            if (menuFromClipboard) {
              menuFromClipboard.addEventListener('click', async () => {
                selectMenu.style.display = 'none';
                try {
                  const clipItems = await navigator.clipboard.read();
                  for (const item of clipItems) {
                    const imgType = item.types.find(t => t.startsWith('image/'));
                    if (imgType) {
                      const blob = await item.getType(imgType);
                      currentFilePath = await window.parent.electronUtils.getPathForClipboardBlob(blob);
                      const url = URL.createObjectURL(blob);
                      const img = new Image();
                      img.onload = () => {
                        showOriginalImage(img);
                        scaleImage();
                      };
                      img.src = url;
                      break;
                    }
                  }
                } catch (err) { console.error('Clipboard paste error:', err); }
              });
            }

            // Splitter drag
            const splitter = document.getElementById('splitter-bar');
            const compareWrapper = document.getElementById('image-compare-wrapper');
            if (splitter && compareWrapper) {
              let dragging = false;
              splitter.addEventListener('mousedown', (e) => { dragging = true; e.preventDefault(); });
              document.addEventListener('mousemove', (e) => {
                if (!dragging) return;
                const rect = compareWrapper.getBoundingClientRect();
                let pct = ((e.clientX - rect.left) / rect.width) * 100;
                pct = Math.max(10, Math.min(90, pct));
                document.getElementById('compare-grid').style.gridTemplateColumns = pct + '% ' + (100 - pct) + '%';
                splitter.style.left = pct + '%';
              });
              document.addEventListener('mouseup', () => { dragging = false; });
            }
          }, 50);
        } else {
          container.innerHTML = `
            <div class="requirement-card">
              <div class="requirement-icon">
                <img src="../assets/WCRAPI.svg" alt="Copilot+ PC" style="width: 40px; height: 40px; object-fit: contain;" />
              </div>
              <div class="requirement-title">Copilot+ PC required</div>
              <div class="requirement-subtitle">This Windows AI API requires a Copilot+ PC and Windows Insider Preview Build 26120.3073 (Dev or Beta Channel).</div>
              <div class="requirement-description">
                <a href="https://learn.microsoft.com/windows/ai/apis/get-started" class="learn-more-link" target="_blank">Learn more</a>
              </div>
              <p class="requirement-description">You can still view the code for the sample.</p>
            </div>
          `;
        }
      }

      document.addEventListener('DOMContentLoaded', renderCopilotSection);

      document.addEventListener('DOMContentLoaded', function () {
        const apiCopyBtn = document.getElementById('api-copy-btn');
        if (apiCopyBtn) {
          apiCopyBtn.setAttribute('copy-text', `const scaler = await ImageScaler.CreateAsync();
const scaledBitmap = scaler.ScaleImageBuffer(imageBuffer, targetWidth, targetHeight);
scaler.Close();`);
        }
        var viewCodeBtn = document.getElementById('view-code-btn');
        if (viewCodeBtn) {
          viewCodeBtn.addEventListener('click', function (e) {
            e.preventDefault();
            var codeContent = document.getElementById('api-code-content');
            var viewCodeLink = viewCodeBtn.parentElement;
            if (codeContent && viewCodeLink) {
              codeContent.classList.remove('collapsed');
              viewCodeLink.style.display = 'none';
            }
          });
        }
      });
    </script>
    <script type="module">
      import { injectGithubMarkdownStyles } from '../styles/github-markdown.js';
      injectGithubMarkdownStyles();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module">
      import { renderGithubMarkdownDoc } from '../scripts/github-markdown-render.js';
      renderGithubMarkdownDoc(
        'ai-doc-markdown',
        'https://raw.githubusercontent.com/MicrosoftDocs/windows-ai-docs/docs/docs/apis/imaging.md',
        /^(#+\s*Get\s+started\s+with\s+(AI\s+)?Imaging.*)$/im,
        'https://learn.microsoft.com/windows/ai/apis',
        true
      );
    </script>
  </body>
</html>
